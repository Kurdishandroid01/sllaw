<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Cinematic Quran</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500&family=Amiri:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #f3c65c;
            --gold-light: #fff5d6;
            --gold-glow: rgba(243, 198, 92, 0.6);
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Video Layer */
        .video-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: blur(2px) contrast(1.15) brightness(0.75);
            transform: scale(1.05);
        }

        /* Cinematic Gradient Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.95) 100%);
            z-index: -1;
        }

        /* 3D Stage Container - Positioned for TikTok */
        .stage {
            position: absolute;
            bottom: 12%; /* Perfect for TikTok */
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            z-index: 10;
        }

        /* Text Block (Entrance Animation) */
        .verse-block {
            text-align: center;
            transform-style: preserve-3d;
            opacity: 0;
            transform: translateZ(-100px) translateY(40px) rotateX(15deg);
            filter: blur(10px);
            transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.2, 0.9, 0.2, 1), filter 0.6s ease;
        }

        .verse-block.active {
            opacity: 1;
            transform: translateZ(0) translateY(0) rotateX(0deg);
            filter: blur(0);
        }

        /* Floating Animation Wrapper */
        .floating-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .verse-block.active .floating-content {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Arabic Text Styling - Glowing & Shimmering */
        .arabic {
            font-family: 'Amiri', serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 5px;
            direction: rtl;
            background: linear-gradient(to right, var(--gold), #ffffff, var(--gold), var(--gold-light));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
            filter: drop-shadow(0px 0px 15px var(--gold-glow)) drop-shadow(0px 5px 5px rgba(0,0,0,0.9));
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        /* Golden Separator Line */
        .separator {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 15px 0;
            transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition-delay: 0.3s;
            box-shadow: 0 0 10px var(--gold-glow);
            border-radius: 50%;
        }

        .verse-block.active .separator {
            width: 70%;
        }

        /* Kurdish Text Styling - Sleek Glassmorphism */
        .kurdish {
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(20, 20, 20, 0.4);
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.02);
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Holy Particles */
        #particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            background: var(--gold-light);
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 8px var(--gold);
            animation: floatUp 10s infinite linear;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* Click to Play Overlay */
        .start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            flex-direction: column;
            color: white;
            transition: opacity 0.6s;
            backdrop-filter: blur(5px);
        }
        .play-btn {
            width: 80px; height: 80px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            animation: pulse 2s infinite;
        }
        .play-triangle {
            width: 0; height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 22px solid var(--gold);
            margin-left: 6px;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(243, 198, 92, 0.6); }
            70% { box-shadow: 0 0 0 25px rgba(243, 198, 92, 0); }
            100% { box-shadow: 0 0 0 0 rgba(243, 198, 92, 0); }
        }
    </style>
</head>
<body>

    <!-- Start Overlay -->
    <div class="start-screen" id="startScreen">
        <div class="play-btn">
            <div class="play-triangle"></div>
        </div>
        <div style="margin-top:20px; font-size:15px; letter-spacing:1px; opacity:0.8; font-weight:300;">کلیک بکە بۆ دەستپێکردن</div>
    </div>

    <!-- Background Video -->
    <div class="video-wrapper">
        <video id="quranVideo" playsinline preload="auto">
            <source src="https://firebasestorage.googleapis.com/v0/b/kamaran-1a19d.appspot.com/o/1772055176039_kuri_pak2024_%D9%A2%D9%A0%D9%A2%D9%A6-%D9%A0%D9%A2-%D9%A2%D9%A5-%D9%A2%D9%A2-%D9%A5%D9%A2-%D9%A2%D9%A4_1772049144218.mp4?alt=media&token=ddbad777-a7a7-4fe8-949d-d4aa981a820a" type="video/mp4">
        </video>
    </div>
    
    <div class="overlay"></div>
    <div id="particles"></div>

    <!-- 3D Stage -->
    <div class="stage">
        <div class="verse-block" id="verseContainer">
            <div class="floating-content">
                <div class="arabic" id="arabicText"></div>
                <div class="separator"></div>
                <div class="kurdish" id="kurdishText"></div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('quranVideo');
        const container = document.getElementById('verseContainer');
        const arabicEl = document.getElementById('arabicText');
        const kurdishEl = document.getElementById('kurdishText');
        const startScreen = document.getElementById('startScreen');

        startScreen.addEventListener('click', () => {
            video.play().then(() => {
                startScreen.style.opacity = '0';
                setTimeout(() => startScreen.style.display = 'none', 600);
                initParticles();
            }).catch(err => alert("تکایە دڵنیابەرەوە ئینتەرنێتەکەت باشە."));
        });

        // ڕێزبەندی کاتەکان بە تەواوی ڕێکخراو بۆ ڤیدیۆکە
        const verses =[
            { start: 0, end: 2.95, arabic: "۞أَلَمۡ تَرَ إِلَى ٱلَّذِينَ نَافَقُواْ", kurdish: "ئایا سه‌رنجت نه‌داوه‌ له‌وانه‌ی که‌ دووڕوو بوون" },
            { start: 2.96, end: 15.00, arabic: "يَقُولُونَ لِإِخۡوَٰنِهِمُ ٱلَّذِينَ كَفَرُواْ مِنۡ أَهۡلِ ٱلۡكِتَٰبِ", kurdish: "به‌ برا بێباوه‌ڕه‌کانیان له‌ خاوه‌ن کتێب ده‌ڵێن" },
            { start: 15.00, end: 18.70, arabic: "لَئِنۡ أُخۡرِجۡتُمۡ لَنَخۡرُجَنَّ مَعَكُمۡ", kurdish: "ئه‌گه‌ر ئێوه‌ ده‌ربکرێن ئێمه‌ش له‌گه‌ڵتاندا ده‌رده‌چین" },
            { start: 19.00, end: 23.00, arabic: "وَلَا نُطِيعُ فِيكُمۡ أَحَدًا أَبَدٗا", kurdish: "وه‌ هه‌رگیز دژی ئێوه‌ به‌قسه‌ی که‌س ناکه‌ین" },
            { start: 23.00, end: 29.00, arabic: "وَإِن قُوتِلۡتُمۡ لَنَنصُرَنَّكُمۡ", kurdish: "خۆ ئه‌گه‌ر جه‌نگتان دژ بکرێت ئێمه‌ پشتیوانیتان لێ ده‌که‌ین" },
            { start: 29.00, end: 35.00, arabic: "وَٱللَّهُ يَشۡهَدُ إِنَّهُمۡ لَكَٰذِبُونَ", kurdish: "بە مەرجێک خوا خۆی شایه‌ته‌ که‌ ئه‌وانه‌ بێگومان درۆزنن" },

            { start: 35.00, end: 39.00, arabic: "لَئِنۡ أُخۡرِجُواْ لَا يَخۡرُجُونَ مَعَهُمۡ", kurdish: "سوێند به‌ خوا ئه‌گه‌ر ده‌ربکرێن له‌گه‌ڵیاندا ده‌رناچن" },
            { start: 39.00, end: 42.00, arabic: "وَلَئِن قُوتِلُواْ لَا يَنصُرُونَهُمۡ", kurdish: "وه‌ ئه‌گه‌ر جه‌نگیان دژبکرێت پشتیوانییان لێناکه‌ن" },
            { start: 42.00, end: 48.00, arabic: "وَلَئِن نَّصَرُوهُمۡ لَيُوَلُّنَّ ٱلۡأَدۡبَٰرَ", kurdish: "وه‌ ئه‌گه‌ر پشتیوانیشیان لێکردن، دوای تاوێک پشت هه‌ڵده‌که‌ن" },
            { start: 48.00, end: 52.00, arabic: "ثُمَّ لَا يُنصَرُونَ", kurdish: "پاشان سه‌رکه‌وتوو نابن" },

            { start: 52.00, end: 56.00, arabic: "لَأَنتُمۡ أَشَدُّ رَهۡبَةٗ فِي صُدُورِهِم", kurdish: "به‌ڕاستی ئێوه‌ی ئیماندار ترستان زیاتره‌ له‌ دڵ و ده‌روونیاندا" },
            { start: 56.00, end: 60.00, arabic: "مِّنَ ٱللَّهِۚ", kurdish: "تاکو خوای گه‌وره‌" },
            { start: 60.00, end: 67.00, arabic: "ذَٰلِكَ بِأَنَّهُمۡ قَوۡمٞ لَّا يَفۡقَهُونَ", kurdish: "چونکه‌ بێگومان ئه‌وانه‌ که‌سانێکی ناحاڵی و تێ نه‌گه‌یشتوون" },

            { start: 67.00, end: 72.00, arabic: "لَا يُقَٰتِلُونَكُمۡ جَمِيعًا إِلَّا فِي قُرٗى مُّحَصَّنَةٍ", kurdish: "هه‌رگیز به‌یه‌ک پارچه‌یی ناوێرن دژی ئێوه‌ بجه‌نگن مه‌گه‌رله‌ شوێنی قایم" },
            { start: 72.00, end: 78.00, arabic: "أَوۡ مِن وَرَآءِ جُدُرِۭۚ", kurdish: "یان له‌ پشتی دیواری به‌رزو قایمه‌وه‌" },
            { start: 78.00, end: 81.00, arabic: "بَأۡسُهُم بَيۡنَهُمۡ شَدِيدٞۚ", kurdish: "نێوانیان زۆر ناخۆشه‌ و چاره‌ی یه‌کتریان ناوێت" },
            { start: 81.00, end: 84.00, arabic: "تَحۡسَبُهُمۡ جَمِيعٗا وَقُلُوبُهُمۡ شَتَّىٰۚ", kurdish: "هه‌رچه‌نده‌ وا ده‌زانیت یه‌کپارچه‌ن، به‌ڵام دڵه‌کانیان دوورن له‌ یه‌که‌وه‌" },
            { start: 84.00, end: 89.00, arabic: "ذَٰلِكَ بِأَنَّهُمۡ قَوۡمٞ لَّا يَعۡقِلُونَ", kurdish: "چونکه‌ ئه‌وانه‌ ژیر و هۆشمه‌ند نین" },

            { start: 89.00, end: 93.00, arabic: "كَمَثَلِ ٱلَّذِينَ مِن قَبۡلِهِمۡ قَرِيبٗاۖ", kurdish: "نموونه‌یان وه‌ك نموونه‌ی بێباواڕانی ئه‌م نزیکانه‌ وایه‌" },
            { start: 93.00, end: 96.00, arabic: "ذَاقُواْ وَبَالَ أَمۡرِهِمۡ", kurdish: "کە به‌ئه‌نجامی کارو کرده‌وه‌ی خۆیان گه‌یشتن" },
            { start: 96.00, end: 99.00, arabic: "وَلَهُمۡ عَذَابٌ أَلِيمٞ", kurdish: "له‌ قیامه‌تیشدا سزای به‌ ئێش و ئازار بۆیان ئاماده‌یه‌" },

            { start: 99.00, end: 104.00, arabic: "كَمَثَلِ ٱلشَّيۡطَٰنِ إِذۡ قَالَ لِلۡإِنسَٰنِ ٱكۡفُرۡ", kurdish: "وه‌ك شه‌یتان وایه‌ که‌ هانی ئاده‌میزاد ده‌دات و پێی ده‌ڵێت: وه‌ره‌ کافربه‌" },
            { start: 104.00, end: 110.00, arabic: "فَلَمَّا كَفَرَ قَالَ إِنِّي بَرِيٓءٞ مِّنكَ", kurdish: "جا کاتێك که‌ کافر بوو پێی ده‌ڵێت: به‌ڕاستی من به‌ریم له‌ تۆ" },
            { start: 110.00, end: 125.00, arabic: "إِنِّيٓ أَخَافُ ٱللَّهَ رَبَّ ٱلۡعَٰلَمِينَ", kurdish: "چونکە من له‌ په‌روه‌ردگاری جیهانیان ده‌ترسم" },

            { start: 125.00, end: 130.00, arabic: "فَكَانَ عَٰقِبَتَهُمَآ أَنَّهُمَا فِي ٱلنَّارِ خَٰلِدَيۡنِ فِيهَاۚ", kurdish: "سه‌رئه‌نجامی هه‌ردووکیان ئه‌وه‌یه‌ که‌ هه‌ردوو له‌ دۆزه‌خدا بۆ هه‌میشه‌ ده‌مێننه‌و" },
            { start: 130.00, end: 135.00, arabic: "وَذَٰلِكَ جَزَٰٓؤُاْ ٱلظَّٰلِمِينَ", kurdish: "ئه‌وه‌ش پاداشتی سته‌مکارانه‌" }
        ];

        let currentIndex = -1;

        video.addEventListener('timeupdate', () => {
            const time = video.currentTime;
            
            const index = verses.findIndex(v => time >= v.start && time < v.end);

            if (index !== -1 && index !== currentIndex) {
                updateVerse(verses[index]);
                currentIndex = index;
            } else if (index === -1 && currentIndex !== -1) {
                container.classList.remove('active');
                currentIndex = -1;
            }
        });

        function updateVerse(data) {
            container.classList.remove('active');
            
            setTimeout(() => {
                arabicEl.innerText = data.arabic;
                kurdishEl.innerText = data.kurdish;
                container.classList.add('active');
            }, 300); // 0.3s delay makes the exit-to-enter animation feel natural
        }

        // Particle System Setup
        function initParticles() {
            const particlesDiv = document.getElementById('particles');
            const count = 40;

            for (let i = 0; i < count; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                let size = Math.random() * 2 + 1.5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 8 + 6) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                particlesDiv.appendChild(p);
            }
        }
    </script>
</body>
</html>
